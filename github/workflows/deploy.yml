.github/workflows/deploy.yml
name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 150460248370.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker image
      run: docker build -t nginx-app 

    - name: Tag image
      run: docker tag nginx-app:latest 150460248370.dkr.ecr.us-east-1.amazonaws.com/nginx-app:latest
      

    - name: Push image
      run: docker push 150460248370.dkr.ecr.us-east-1.amazonaws.com/nginx-app:latest
